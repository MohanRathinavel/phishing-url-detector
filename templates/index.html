<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard — URL Threat Detector</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <!-- React + Babel (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── tiny icon components ───────────────────────────────── */
    const ShieldIcon = ({ safe }) => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
           strokeLinecap="round" strokeLinejoin="round" className="icon-lg">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        {safe
          ? <polyline points="9 12 11 14 15 10" stroke="currentColor"/>
          : <><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></>}
      </svg>
    );

    const LinkIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
           strokeLinecap="round" strokeLinejoin="round" className="icon-sm">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
    );

    const SpinIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
           strokeLinecap="round" className="icon-sm spin">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
      </svg>
    );

    /* ── confidence ring ─────────────────────────────────────── */
    function ConfidenceRing({ value, safe }) {
      const r = 42, circ = 2 * Math.PI * r;
      const fill = circ - (value / 100) * circ;
      const colour = safe ? "var(--safe)" : "var(--danger)";
      return (
        <div className="ring-wrap">
          <svg viewBox="0 0 100 100" className="ring-svg">
            <circle cx="50" cy="50" r={r} className="ring-bg"/>
            <circle cx="50" cy="50" r={r} className="ring-fg"
              stroke={colour}
              strokeDasharray={circ}
              strokeDashoffset={fill}/>
          </svg>
          <div className="ring-label">
            <span className="ring-num">{value}<small>%</small></span>
            <span className="ring-sub">confidence</span>
          </div>
        </div>
      );
    }

    /* ── feature badge ───────────────────────────────────────── */
    function FeatureBadge({ label, value }) {
      const isFlag = value === 1 && ["has_at","has_ip","has_suspicious","has_port","tld_in_path"].includes(label);
      const isGood = label === "has_https" && value === 1;
      return (
        <div className={`feature-badge ${isFlag ? "badge-warn" : isGood ? "badge-good" : ""}`}>
          <span className="badge-key">{label.replace(/_/g," ")}</span>
          <span className="badge-val">{typeof value === "number" && !Number.isInteger(value)
            ? value.toFixed(3) : String(value)}</span>
        </div>
      );
    }

    /* ── sample URLs ─────────────────────────────────────────── */
    const SAMPLES = [
      { label: "✅ Safe",     url: "https://github.com/openai/whisper" },
      { label: "✅ Safe",     url: "https://stackoverflow.com/questions/python" },
      { label: "🚨 Phishing", url: "http://192.168.1.1/login/verify@secure" },
      { label: "🚨 Phishing", url: "http://paypal-secure-update.xyz/account/login.php" },
    ];

    /* ── main app ────────────────────────────────────────────── */
    function App() {
      const [url,       setUrl]    = useState("");
      const [result,    setResult] = useState(null);
      const [loading,   setLoad]   = useState(false);
      const [error,     setError]  = useState(null);
      const [history,   setHistory]= useState([]);
      const [tab,       setTab]    = useState("scan");   // "scan" | "history" | "plots"
      const [plots,     setPlots]  = useState([]);
      const [modelName, setModel]  = useState("{{ model_name }}");
      const inputRef = useRef();

      useEffect(() => {
        fetch("/plots").then(r=>r.json()).then(d=>setPlots(d.plots||[]));
        fetch("/health").then(r=>r.json()).then(d=>setModel(d.model||modelName));
      }, []);

      async function scan(targetUrl) {
        const raw = (targetUrl || url).trim();
        if (!raw) { setError("Please enter a URL."); return; }
        setError(null); setResult(null); setLoad(true);
        try {
          const res  = await fetch("/predict", {
            method:"POST", headers:{"Content-Type":"application/json"},
            body: JSON.stringify({url: raw})
          });
          const data = await res.json();
          if (data.error) { setError(data.error); }
          else {
            setResult(data);
            setHistory(h => [{...data, ts: new Date().toLocaleTimeString()}, ...h].slice(0,20));
          }
        } catch(e) {
          setError("Network error — is the Flask server running?");
        } finally { setLoad(false); }
      }

      function pickSample(s) {
        setUrl(s.url);
        setResult(null); setError(null);
        setTimeout(() => scan(s.url), 50);
      }

      return (
        <div className="app">
          {/* ── header ── */}
          <header className="header">
            <div className="header-inner">
              <div className="logo">
                <svg viewBox="0 0 36 36" className="logo-icon">
                  <path d="M18 3 L33 9 L33 21 C33 29 18 35 18 35 C18 35 3 29 3 21 L3 9 Z"
                        fill="url(#lg)" stroke="none"/>
                  <defs>
                    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
                      <stop offset="0%" stopColor="var(--accent-1)"/>
                      <stop offset="100%" stopColor="var(--accent-2)"/>
                    </linearGradient>
                  </defs>
                  <polyline points="11,18 16,23 25,13" fill="none"
                            stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                <div>
                  <h1 className="logo-title">PhishGuard</h1>
                  <p className="logo-sub">ML-Powered URL Threat Detector</p>
                </div>
              </div>
              <div className="model-pill">🤖 {modelName}</div>
            </div>
          </header>

          {/* ── tabs ── */}
          <nav className="tab-bar">
            {[["scan","🔍 Scan URL"],["history","🕒 History"],["plots","📊 Model Insights"]].map(([id,label])=>(
              <button key={id} className={`tab-btn ${tab===id?"active":""}`} onClick={()=>setTab(id)}>
                {label}
              </button>
            ))}
          </nav>

          <main className="main">

            {/* ════ SCAN TAB ════ */}
            {tab === "scan" && (
              <div className="scan-panel">
                {/* input card */}
                <div className="card input-card">
                  <label className="input-label">
                    <LinkIcon/> Enter URL to analyse
                  </label>
                  <div className="input-row">
                    <input
                      ref={inputRef}
                      className="url-input"
                      type="text"
                      placeholder="https://example.com/path?query=value"
                      value={url}
                      onChange={e=>{setUrl(e.target.value); setError(null); setResult(null);}}
                      onKeyDown={e=>e.key==="Enter" && scan()}
                    />
                    <button className="scan-btn" onClick={()=>scan()} disabled={loading}>
                      {loading ? <><SpinIcon/> Scanning…</> : "Analyse →"}
                    </button>
                  </div>
                  {error && <p className="error-msg">⚠ {error}</p>}

                  {/* sample pills */}
                  <div className="sample-row">
                    <span className="sample-label">Try a sample:</span>
                    {SAMPLES.map((s,i)=>(
                      <button key={i} className="sample-pill" onClick={()=>pickSample(s)}>
                        {s.label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* result card */}
                {result && (
                  <div className={`card result-card ${result.label===1?"result-phishing":"result-safe"}`}>
                    <div className="result-top">
                      <div className="verdict">
                        <ShieldIcon safe={result.label===0}/>
                        <div>
                          <p className="verdict-label">Verdict</p>
                          <h2 className={`verdict-text ${result.label===1?"text-danger":"text-safe"}`}>
                            {result.prediction}
                          </h2>
                          <p className="verdict-url">{result.url}</p>
                        </div>
                      </div>
                      <ConfidenceRing value={result.confidence} safe={result.label===0}/>
                    </div>

                    {/* feature grid */}
                    <div className="features-section">
                      <h3 className="section-title">Extracted Features</h3>
                      <div className="feature-grid">
                        {Object.entries(result.features).map(([k,v])=>(
                          <FeatureBadge key={k} label={k} value={v}/>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ════ HISTORY TAB ════ */}
            {tab === "history" && (
              <div className="card">
                <h2 className="card-title">Scan History</h2>
                {history.length === 0
                  ? <p className="empty-msg">No scans yet. Analyse a URL first.</p>
                  : (
                    <div className="history-list">
                      {history.map((h,i)=>(
                        <div key={i} className={`history-item ${h.label===1?"hi-phish":"hi-safe"}`}>
                          <span className={`hi-badge ${h.label===1?"badge-danger":"badge-safe"}`}>
                            {h.prediction}
                          </span>
                          <span className="hi-url">{h.url}</span>
                          <span className="hi-conf">{h.confidence}%</span>
                          <span className="hi-time">{h.ts}</span>
                        </div>
                      ))}
                    </div>
                  )
                }
              </div>
            )}

            {/* ════ PLOTS TAB ════ */}
            {tab === "plots" && (
              <div className="plots-panel">
                <h2 className="card-title">Model Insights</h2>
                {plots.length === 0
                  ? <p className="empty-msg">
                      No plots found. Run <code>python model/train_model.py</code> first.
                    </p>
                  : (
                    <div className="plots-grid">
                      {plots.map(p=>(
                        <div key={p} className="card plot-card">
                          <p className="plot-name">{p.replace(/_/g," ").replace(".png","")}</p>
                          <img src={`/static/plots/${p}`} alt={p} className="plot-img"/>
                        </div>
                      ))}
                    </div>
                  )
                }
              </div>
            )}

          </main>

          <footer className="footer">
            Built with Python · scikit-learn · Flask · React
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
